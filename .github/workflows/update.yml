name: Update Charts

on:
  schedule:
    - cron: '0 2,4,6,8 * * *'  # 10am, 12pm, 2pm, 4pm CST (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start Tor
        run: |
          sudo apt-get install -y tor -q
          sudo service tor start
          echo "Waiting for Tor to bootstrap..."
          timeout 120 bash -c 'until nc -z 127.0.0.1 9050; do sleep 2; done'
          echo "Tor ready"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts
        run: torify python3 generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update charts $(date -u +%Y-%m-%d)"
          git push
